<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aiury Web Favicon">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#102443" />
      <stop offset="100%" stop-color="#060a11" />
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#84ddff" />
      <stop offset="100%" stop-color="#56b8ef" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bgGlow)" />
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#1d365c" stroke-width="1.2" />

  <circle cx="32" cy="32" r="22" fill="none" stroke="#1c3357" stroke-width="1.4" />
  <circle cx="32" cy="32" r="20.2" fill="none" stroke="url(#accent)" stroke-opacity="0.45" stroke-width="1.1" />

  <path
    d="M22 45 L32 18 L42 45 M26.8 34 H37.2"
    fill="none"
    stroke="url(#accent)"
    stroke-width="3.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <circle cx="45.2" cy="19.2" r="1.8" fill="#84ddff" fill-opacity="0.9" />
</svg>
